<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title></title>

  <!-- <link href="https://fonts.googleapis.com/css?family=Luckiest+Guy&display=swap" rel="stylesheet"> -->

  <style>
    /* latin */
    @font-face {
      font-family: 'Luckiest Guy';
      font-style: normal;
      font-weight: normal;
      font-display: swap;
      src: local('Luckiest Guy Regular'), local('LuckiestGuy-Regular'), url(https://fonts.gstatic.com/s/luckiestguy/v11/_gP_1RrxsjcxVyin9l9n_j2hTd52.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    :root {
      --stroke: #ccc;
      --text: #666;
      --bg: #dadada;
      --duration: 550ms;
      --easing: cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .pd_content {
      position: absolute;
      width: 100%;
      top: 10%;
      cursor: pointer;
      user-select: none;
    }

    .pd_content>h1,
    .pd_content>h2 {
      position: absolute;
      color: var(--text);
      margin: 0;
      width: 100%;
      letter-spacing: 0px;
      text-align: center;
      font-family: 'Luckiest Guy', cursive;
      margin-left: 10px;
      line-height: 1;
      white-space: nowrap;
      /* transform: translateX(-120px); 
      -webkit-transform: translateX(-120px);  */
      -webkit-text-stroke-color: var(--stroke);
      -webkit-text-stroke-width: 1px;

    }

    .pd_content>h1 {
      top: 50px;
      font-size: 3.75rem;
    }

    .pd_content>h2 {
      top: 160px;
      font-size: 2.187rem;
    }

    .pd_content>h1 span.capital {
      font-size: 5.312rem;
    }

    .pd_content>h2 span.capital {
      font-size: 3.125rem;
    }

    .pd_content>h1 span,
    .pd_content>h2 span {
      display: inline-block;
      opacity: 0;
      transition: all var(--duration) ease 750ms;
      -webkit-transform: translateX(5px);
      transform: translateX(5px);
    }

    .pd_content>h1 span.animate-in,
    .pd_content>h2 span.animate-in {
      opacity: 1;
      -webkit-transform: translateX(0px);
      transform: translateX(0px);
    }
  </style>
</head>

<body>
  <div class="pd_content" onclick="dontTouchMe()">
    <h1>
      <span class="capital">P</span>
      <span>d</span>
      <span>o</span>
      <span>n</span>
      <span>e</span>
      <span>'s</span>
      <span class="capital">B</span>
      <span>l</span>
      <span>o</span>
      <span>g</span>
    </h1>

    <h2>
      <span class="capital">L</span>
      <span>o</span>
      <span>v</span>
      <span>e</span>
      <span>&</span>
      <span class="capital">P</span>
      <span>e</span>
      <span>a</span>
      <span>c</span>
      <span>e</span>
    </h2>
  </div>

  <script>
    var spans = document.getElementsByTagName('span')
    var touchMeTimes = 0;
    function dontTouchMe() {
      var touchMeMsg = "";
      switch (touchMeTimes) {
        case 0:
          touchMeMsg = "憋点我，再点我就吃了你~"
          break;
        case 1:
          touchMeMsg = "你还点...造反了不成？"
          break;
        case 2:
          touchMeMsg = "。。。。。。"
          break;
        case 3:
          touchMeMsg = "你还点..."
          break;
        case 4:
          touchMeMsg = "算啦...给你点......"
          break;
        default:
          touchMeMsg = "小伙汁，你已经点我" + touchMeTimes + "次了。。。"
          break;
      }
      touchMeTimes++
      alert(touchMeMsg)
    }

    function doSetTimeout(i) {
      setTimeout(function () {
        spans[i].classList += ' animate-in'
      }, 120 * i)
    }

    window.addEventListener('load', function () {
      for (var i = 0; i < spans.length; i++) {
        doSetTimeout(i)
      }
    })
  </script>

</body>

</html>
